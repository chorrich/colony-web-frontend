<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jarvis Trading Terminal | The Colony</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <!-- KLineChart for Advanced Professional Charting (Supports Shapes/Drawings) -->
    <script src="https://cdn.jsdelivr.net/npm/klinecharts@9/dist/klinecharts.min.js"></script>
    
    <style>
        :root {
            --bg-dark: #0a0e17;
            --bg-panel: #111827;
            --border-color: #1f2937;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --jarvis-blue: #0ea5e9;
            --jarvis-neon: #38bdf8;
            --jarvis-glow: rgba(56, 189, 248, 0.5);
            --profit-green: #10b981;
            --loss-red: #ef4444;
            --gold: #fbbf24;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            height: 100vh;
            height: 100dvh; /* dynamic viewport height for mobile Safari */
            overflow: hidden;
            display: flex;
            flex-direction: column;
            padding-top: env(safe-area-inset-top);
        }

        /* ---------------- HEADER ---------------- */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            background: linear-gradient(90deg, #0a0e17 0%, #111827 100%);
            border-bottom: 1px solid var(--jarvis-glow);
            box-shadow: 0 0 15px rgba(14, 165, 233, 0.1);
            flex-shrink: 0;
        }

        .header-logo {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }

        .header-logo svg {
            filter: drop-shadow(0 0 5px var(--jarvis-neon));
        }

        .header-title {
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            font-size: 1rem;
            color: #e5e7eb;
            letter-spacing: 0.5px;
        }

        .back-btn {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 6px;
            background: rgba(255,255,255,0.05);
            transition: all 0.2s;
        }

        .back-btn:hover {
            color: #fff;
            background: rgba(255,255,255,0.1);
        }

        /* ---------------- MAIN WORKSPACE ---------------- */
        .workspace {
            display: flex;
            flex: 1;
            overflow: hidden;
            min-height: 0; /* Important for flex child to not expand implicitly on Safari */
        }

        /* ----- LEFT: CHART AREA ----- */
        .chart-container {
            flex: 2;
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border-color);
            background: var(--bg-dark);
            position: relative;
        }

        .chart-header {
            padding: 10px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(17, 24, 39, 0.8);
            border-bottom: 1px solid var(--border-color);
            z-index: 10;
        }

        .asset-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .asset-name {
            font-weight: 700;
            font-size: 1.2rem;
            color: var(--gold);
        }

        .asset-price {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1rem;
            color: var(--profit-green);
        }

        .timeframe-selector {
            display: flex;
            gap: 4px;
        }

        .tf-btn {
            background: transparent;
            border: 1px solid transparent;
            color: var(--text-muted);
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .tf-btn.active, .tf-btn:hover {
            color: var(--jarvis-neon);
            border-color: rgba(56, 189, 248, 0.3);
            background: rgba(56, 189, 248, 0.05);
        }

        #tv-chart {
            flex: 1;
            width: 100%;
            position: relative;
            min-height: 0; /* Crucial for Safari */
        }

        /* ----- RIGHT: AI CHAT AREA ----- */
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-panel);
            min-width: 320px;
            max-width: 500px;
        }

        .chat-header {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }

        .jarvis-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--jarvis-blue), #0284c7);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 10px var(--jarvis-glow);
        }

        .jarvis-status {
            font-size: 0.8rem;
            color: var(--profit-green);
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .status-dot {
            width: 6px;
            height: 6px;
            background: var(--profit-green);
            border-radius: 50%;
            box-shadow: 0 0 5px var(--profit-green);
            animation: pulse 2s infinite;
        }

        .chat-history {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            min-height: 0;
        }

        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 0.95rem;
            line-height: 1.5;
            position: relative;
        }

        .msg-user {
            align-self: flex-end;
            background: rgba(255, 255, 255, 0.08);
            border-bottom-right-radius: 2px;
        }

        .msg-ai {
            align-self: flex-start;
            background: rgba(14, 165, 233, 0.1);
            border: 1px solid rgba(14, 165, 233, 0.2);
            border-bottom-left-radius: 2px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .msg-ai .strategy-tag {
            display: inline-block;
            background: rgba(251, 191, 36, 0.15);
            color: var(--gold);
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-bottom: 8px;
            border: 1px solid rgba(251, 191, 36, 0.3);
        }

        /* Interactive Action Box */
        .action-box {
            margin-top: 12px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px;
        }

        .action-specs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 12px;
            font-size: 0.85rem;
        }

        .spec { display: flex; justify-content: space-between; }
        .spec-label { color: var(--text-muted); }
        .spec-val.buy { color: var(--jarvis-neon); font-weight: 600; }
        .spec-val.sl { color: var(--loss-red); font-family: monospace;}
        .spec-val.tp { color: var(--profit-green); font-family: monospace;}

        .action-buttons {
            display: flex;
            gap: 10px;
        }

        .btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.9rem;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
        }

        .btn-yes {
            background: var(--jarvis-blue);
            color: white;
            box-shadow: 0 0 10px var(--jarvis-glow);
        }
        .btn-yes:hover { background: #0284c7; box-shadow: 0 0 15px var(--jarvis-glow); transform: translateY(-1px); }

        .btn-no {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border-color);
        }
        .btn-no:hover { background: rgba(255,255,255,0.05); color: #fff; }

        .chat-input-area {
            padding: 16px;
            border-top: 1px solid var(--border-color);
            background: rgba(17, 24, 39, 0.9);
            flex-shrink: 0;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .chat-input {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--text-main);
            padding: 14px 45px 14px 16px;
            border-radius: 24px;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.3s;
        }

        .chat-input:focus {
            border-color: var(--jarvis-neon);
            background: rgba(0,0,0,0.2);
        }

        .send-btn {
            position: absolute;
            right: 8px;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--jarvis-blue);
            border: none;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .send-btn:hover { background: #0284c7; transform: scale(1.05); }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* ---------------- RESPONSIVE (MOBILE) ---------------- */
        @media (max-width: 768px) {
            .workspace {
                flex-direction: column;
            }
            .chart-container {
                flex: 1;
                border-right: none;
                border-bottom: 1px solid var(--jarvis-glow);
                min-height: 45vh;
            }
            .chat-container {
                flex: 1;
                max-width: 100%;
                min-height: 40vh;
            }
            .header-title {
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="header">
        <a href="index.html" class="header-logo">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#38bdf8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>
            </svg>
            <div class="header-title">Jarvis Trading Terminal</div>
        </a>
        <a href="index.html" class="back-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            Exit Terminal
        </a>
    </header>

    <!-- Main Workspace -->
    <main class="workspace">
        
        <!-- Left: Chart Area -->
        <section class="chart-container">
            <div class="chart-header">
                <div class="asset-info">
                    <span class="asset-name">XAUUSD</span>
                    <span class="asset-price" id="live-price">2345.67</span>
                </div>
                <div class="timeframe-selector">
                    <button class="tf-btn" onclick="switchTimeframe('M1', this)">M1</button>
                    <button class="tf-btn" onclick="switchTimeframe('M5', this)">M5</button>
                    <button class="tf-btn" onclick="switchTimeframe('M15', this)">M15</button>
                    <button class="tf-btn" onclick="switchTimeframe('M30', this)">M30</button>
                    <button class="tf-btn active" onclick="switchTimeframe('H1', this)">H1</button>
                    <button class="tf-btn" onclick="switchTimeframe('H4', this)">H4</button>
                    <button class="tf-btn" onclick="switchTimeframe('D1', this)">D1</button>
                </div>
            </div>
            <div id="chart-wrapper" style="position:relative; width:100%; flex:1; overflow:hidden;">
                <div id="tv-chart" style="width:100%; height:100%;"></div>
                <canvas id="overlay-canvas" style="position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:10;"></canvas>
            </div>
        </section>

        <!-- Right: Chat Area -->
        <section class="chat-container">
            <div class="chat-header">
                <div class="jarvis-avatar">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><path d="M12 16v-4"></path><path d="M12 8h.01"></path></svg>
                </div>
                <div>
                    <div style="font-weight: 600; font-size: 0.95rem;">JARVIS AI</div>
                    <div class="jarvis-status"><div class="status-dot"></div> Connected to MT5</div>
                </div>
            </div>

            <div class="chat-history" id="chat-history">
                <!-- Welcome Msg -->
                <div class="message msg-ai">
                    สวัสดีครับ! ผม Jarvis AI พร้อมวิเคราะห์กราฟและส่งคำสั่งเทรดเข้า MT5 ให้ครับ<br><br>
                    ลองพิมพ์ เช่น <b>"วิเคราะห์ทอง"</b> หรือ <b>"Analyze XAUUSD"</b> ได้เลยครับ 🚀
                </div>
            </div>

            <div class="chat-input-area">
                <div class="input-wrapper">
                    <input type="text" id="chat-input" class="chat-input" placeholder="พิมพ์ข้อความถาม Jarvis...">
                    <button id="send-btn" class="send-btn" type="button">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                    </button>
                </div>
            </div>
        </section>

    </main>

    <script>
        const API_URL = "https://web-production-dae6e.up.railway.app";
        let chart = null;
        var smcDrawings = null; // Store drawings data for redraw on scroll/zoom

        function initChart() {
            // Init KLineChart
            chart = klinecharts.init('tv-chart', {
                styles: {
                    grid: { horizontal: { color: '#1f2937' }, vertical: { color: '#1f2937' } },
                    candle: {
                        type: 'candle_solid',
                        bar: { upColor: '#10b981', downColor: '#ef4444', noChangeColor: '#888888', upBorderColor: '#10b981', downBorderColor: '#ef4444', noChangeBorderColor: '#888888', upWickColor: '#10b981', downWickColor: '#ef4444', noChangeWickColor: '#888888' }
                    },
                    yAxis: { axisLine: { color: '#1f2937' }, tickText: { color: '#9ca3af' } },
                    xAxis: { axisLine: { color: '#1f2937' }, tickText: { color: '#9ca3af' } },
                    separator: { color: '#1f2937' },
                    crosshair: { horizontal: { lineColor: '#38bdf8' }, vertical: { lineColor: '#38bdf8' } }
                }
            });

            // Load real data from Railway backend
            loadChartData('XAUUSD', 'H1');

            // Responsive resize
            window.addEventListener('resize', function() {
                chart.resize();
                resizeOverlayCanvas();
                if (smcDrawings) drawSMCOverlay(smcDrawings);
            });

            // Redraw SMC zones when user scrolls/zooms the chart
            chart.subscribeAction('onScroll', function() {
                if (smcDrawings) drawSMCOverlay(smcDrawings);
            });
            chart.subscribeAction('onZoom', function() {
                if (smcDrawings) drawSMCOverlay(smcDrawings);
            });
        }

        function resizeOverlayCanvas() {
            var canvas = document.getElementById('overlay-canvas');
            var wrapper = document.getElementById('chart-wrapper');
            canvas.width = wrapper.offsetWidth;
            canvas.height = wrapper.offsetHeight;
        }

        function drawSMCOverlay(d) {
            var canvas = document.getElementById('overlay-canvas');
            resizeOverlayCanvas();
            var ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Get chart's visible price range from the Y axis
            var dataList = chart.getDataList();
            if (!dataList || dataList.length < 2) return;

            // Find visible price range by checking all visible candles
            var visibleRange = chart.getVisibleRange(); // { from, to, realFrom, realTo }
            if (!visibleRange) return;

            var minPrice = Infinity, maxPrice = -Infinity;
            for (var i = visibleRange.from; i <= Math.min(visibleRange.to, dataList.length - 1); i++) {
                if (dataList[i]) {
                    if (dataList[i].low < minPrice) minPrice = dataList[i].low;
                    if (dataList[i].high > maxPrice) maxPrice = dataList[i].high;
                }
            }
            if (minPrice === Infinity) return;

            // Add 5% padding like the chart does
            var range = maxPrice - minPrice;
            maxPrice += range * 0.05;
            minPrice -= range * 0.05;
            range = maxPrice - minPrice;

            // Chart area dimensions (exclude Y-axis area ~60px on right, X-axis ~30px at bottom)
            var yAxisWidth = 60;
            var xAxisHeight = 30;
            var chartW = canvas.width - yAxisWidth;
            var chartH = canvas.height - xAxisHeight;

            // Price to Y pixel
            function priceToY(price) {
                return chartH - ((price - minPrice) / range) * chartH;
            }

            // Timestamp to X pixel
            var visibleCount = visibleRange.to - visibleRange.from + 1;
            var barWidth = chartW / visibleCount;

            function timestampToX(ts) {
                // Find the index of closest data point
                for (var i = visibleRange.from; i <= Math.min(visibleRange.to, dataList.length - 1); i++) {
                    if (dataList[i] && dataList[i].timestamp >= ts) {
                        return (i - visibleRange.from) * barWidth;
                    }
                }
                return chartW; // If beyond visible, draw to the edge
            }

            // ---- Draw Order Block Box ----
            var y1 = priceToY(d.entry);
            var y2 = priceToY(d.sl);
            var x1 = d.ob_time ? timestampToX(d.ob_time) : 0;
            var x2 = chartW; // extend to right edge

            var boxY = Math.min(y1, y2);
            var boxH = Math.abs(y2 - y1);

            // Filled rectangle
            ctx.fillStyle = d.isBuy ? 'rgba(56, 189, 248, 0.18)' : 'rgba(239, 68, 68, 0.18)';
            ctx.fillRect(x1, boxY, x2 - x1, boxH);

            // Border of rectangle
            ctx.strokeStyle = d.isBuy ? '#38bdf8' : '#ef4444';
            ctx.lineWidth = 1.5;
            ctx.strokeRect(x1, boxY, x2 - x1, boxH);

            // Label
            ctx.font = 'bold 11px Inter, sans-serif';
            ctx.fillStyle = d.isBuy ? '#38bdf8' : '#ef4444';
            ctx.fillText(d.isBuy ? '🟦 Demand Zone (OB)' : '🟥 Supply Zone (OB)', x1 + 6, boxY + 14);

            // ---- Draw TP Line ----
            var yTP = priceToY(d.tp);
            ctx.setLineDash([8, 4]);
            ctx.strokeStyle = '#10b981';
            ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(0, yTP); ctx.lineTo(chartW, yTP); ctx.stroke();
            ctx.fillStyle = '#10b981';
            ctx.font = 'bold 11px Inter, sans-serif';
            ctx.fillText('TP ' + d.tp.toFixed(2), chartW - 100, yTP - 5);

            // ---- Draw ENTRY Line ----
            var yEntry = priceToY(d.entry);
            ctx.setLineDash([4, 4]);
            ctx.strokeStyle = d.isBuy ? '#38bdf8' : '#ef4444';
            ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(0, yEntry); ctx.lineTo(chartW, yEntry); ctx.stroke();
            ctx.fillStyle = d.isBuy ? '#38bdf8' : '#ef4444';
            ctx.fillText('ENTRY ' + d.entry.toFixed(2), chartW - 120, yEntry - 5);

            // ---- Draw SL Line ----
            var ySL = priceToY(d.sl);
            ctx.setLineDash([]);
            ctx.strokeStyle = '#ef4444';
            ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(0, ySL); ctx.lineTo(chartW, ySL); ctx.stroke();
            ctx.fillStyle = '#ef4444';
            ctx.fillText('SL ' + d.sl.toFixed(2), chartW - 100, ySL + 14);

            ctx.setLineDash([]);
        }

        var currentSymbol = 'XAUUSD';
        var currentTimeframe = 'H1';

        function switchTimeframe(tf, btn) {
            currentTimeframe = tf;
            // Update active button
            document.querySelectorAll('.tf-btn').forEach(function(b) { b.classList.remove('active'); });
            btn.classList.add('active');
            loadChartData(currentSymbol, tf);
        }

        async function loadChartData(symbol, timeframe) {
            document.getElementById('live-price').innerText = 'Loading...';
            chart.clearData();
            try {
                var res = await fetch(API_URL + '/chart-data?symbol=' + symbol + '&timeframe=' + timeframe);
                var result = await res.json();
                if (result.status === 'ok' && result.candles && result.candles.length > 0) {
                    var formatData = result.candles.map(c => ({
                        timestamp: c.time * 1000,
                        open: c.open,
                        high: c.high,
                        low: c.low,
                        close: c.close,
                        volume: 0
                    }));
                    chart.applyNewData(formatData);
                    document.getElementById('live-price').innerText = result.current_price.toFixed(2);
                } else {
                    document.getElementById('live-price').innerText = 'No data';
                }
            } catch(e) {
                console.warn('API fetch error:', e);
                document.getElementById('live-price').innerText = 'Failed to load';
            }
        }

        // ---- Chat Logic ----
        function addMessage(text, isUser, htmlContent) {
            const chatHistory = document.getElementById('chat-history');
            const div = document.createElement('div');
            div.className = 'message ' + (isUser ? 'msg-user' : 'msg-ai');
            if (htmlContent) { div.innerHTML = htmlContent; } else { div.innerText = text; }
            chatHistory.appendChild(div);
            chatHistory.scrollTop = chatHistory.scrollHeight;
        }

        async function submitMessage() {
            const chatInput = document.getElementById('chat-input');
            const text = chatInput.value.trim();
            if (!text) return;

            addMessage(text, true);
            chatInput.value = '';

            const loadingId = 'load_' + Date.now();
            addMessage('', false, '<div id="' + loadingId + '" class="jarvis-status"><div class="status-dot"></div> กำลังวิเคราะห์ตลาด...</div>');

            try {
                const res = await fetch(API_URL + '/terminal-chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text, symbol: 'XAUUSD', timeframe: 'H1' })
                });
                const result = await res.json();
                var el = document.getElementById(loadingId);
                if (el && el.parentElement) el.parentElement.remove();

                if (result && result.reply) {
                    var r = result.reply;
                    var html = '';
                    if (r.strategy) html += '<div class="strategy-tag">' + r.strategy + '</div>';
                    html += '<div>' + r.text + '</div>';

                    if (r.action) {
                        html += '<div class="action-box">';
                        html += '<div style="font-size:0.8rem;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);margin-bottom:8px">Recommended Setup</div>';
                        html += '<div class="action-specs">';
                        html += '<div class="spec"><span class="spec-label">Action</span> <span class="spec-val buy">' + r.action.type + '</span></div>';
                        html += '<div class="spec"><span class="spec-label">Risk</span> <span class="spec-val" style="color:var(--text-main)">' + r.action.risk + '</span></div>';
                        html += '<div class="spec"><span class="spec-label">Entry</span> <span class="spec-val">' + r.action.entry + '</span></div>';
                        html += '<div class="spec"><span class="spec-label">Volume</span> <span class="spec-val">' + r.action.volume + '</span></div>';
                        html += '<div class="spec"><span class="spec-label">Stop Loss</span> <span class="spec-val sl">' + r.action.sl + '</span></div>';
                        html += '<div class="spec"><span class="spec-label">Take Profit</span> <span class="spec-val tp">' + r.action.tp + '</span></div>';
                        html += '</div>';
                        html += '<div style="margin-bottom:12px;font-size:0.9rem">ต้องการให้ผมวางออเดอร์เข้า MT5 เลยไหมครับ?</div>';
                        html += '<div class="action-buttons">';
                        html += '<button class="btn btn-yes" onclick="executeOrder(this)">YES, EXECUTE</button>';
                        html += '<button class="btn btn-no" onclick="this.parentElement.parentElement.innerHTML=\'❌ Cancelled\'">NO, CANCEL</button>';
                        html += '</div></div>';
                    }
                    addMessage('', false, html);

                    if (r.drawings && r.drawings.entry) {
                        // Clear previous overlays
                        chart.removeOverlay();

                        // Store drawing data and render canvas overlay
                        smcDrawings = {
                            entry: r.drawings.entry,
                            sl: r.drawings.sl,
                            tp: r.drawings.tp,
                            ob_time: r.drawings.ob_time,
                            isBuy: r.action.type.includes('BUY')
                        };
                        drawSMCOverlay(smcDrawings);
                    }
                }
            } catch (e) {
                var el2 = document.getElementById(loadingId);
                if (el2 && el2.parentElement) el2.parentElement.remove();
                addMessage('❌ Server ไม่ตอบสนอง: ' + e.message, false);
            }
        }

        function executeOrder(btn) {
            btn.innerHTML = 'EXECUTING...';
            fetch(API_URL + '/terminal-execute', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({}) })
                .then(function(res) { return res.json(); })
                .then(function(result) { btn.parentElement.innerHTML = '<span style="color:var(--profit-green)"><b>' + result.message + '</b></span>'; })
                .catch(function() { btn.innerHTML = 'FAILED!'; });
        }

        // ---- Init on page load ----
        document.addEventListener('DOMContentLoaded', function() {
            // Delay chart init 200ms so Safari has time to compute flex layout
            setTimeout(initChart, 200);

            // Bind send button (both click + touch for iPad)
            var sendBtn = document.getElementById('send-btn');
            var chatInput = document.getElementById('chat-input');

            sendBtn.addEventListener('click', function(e) { e.preventDefault(); submitMessage(); });
            sendBtn.addEventListener('touchend', function(e) { e.preventDefault(); submitMessage(); });
            chatInput.addEventListener('keypress', function(e) { if (e.key === 'Enter') { e.preventDefault(); submitMessage(); } });
        });
    </script>
</body>
</html>
