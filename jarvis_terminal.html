<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jarvis Trading Terminal | The Colony</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #0a0e17;
            --bg-panel: #111827;
            --border-color: #1f2937;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --jarvis-blue: #0ea5e9;
            --jarvis-neon: #38bdf8;
            --jarvis-glow: rgba(56, 189, 248, 0.5);
            --profit-green: #10b981;
            --loss-red: #ef4444;
            --gold: #fbbf24;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            padding-top: env(safe-area-inset-top);
        }

        /* ---------------- HEADER ---------------- */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            background: linear-gradient(90deg, #0a0e17 0%, #111827 100%);
            border-bottom: 1px solid var(--jarvis-glow);
            box-shadow: 0 0 15px rgba(14, 165, 233, 0.1);
            flex-shrink: 0;
        }

        .header-logo {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }

        .header-logo svg {
            filter: drop-shadow(0 0 5px var(--jarvis-neon));
        }

        .header-title {
            font-weight: 500;
            font-size: 1rem;
            color: #e5e7eb;
            letter-spacing: 0.5px;
        }

        .back-btn {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 6px;
            background: rgba(255,255,255,0.05);
            transition: all 0.2s;
        }

        .back-btn:hover {
            color: #fff;
            background: rgba(255,255,255,0.1);
        }

        /* ---------------- MAIN WORKSPACE ---------------- */
        .workspace {
            display: flex;
            flex: 1;
            overflow: hidden;
            min-height: 0;
        }

        /* ----- LEFT: CHART AREA ----- */
        .chart-container {
            flex: 2;
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border-color);
            background: var(--bg-dark);
            position: relative;
        }

        .chart-header {
            padding: 10px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(17, 24, 39, 0.8);
            border-bottom: 1px solid var(--border-color);
            z-index: 10;
        }

        .asset-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .asset-name {
            font-weight: 700;
            font-size: 1.2rem;
            color: var(--gold);
        }

        .asset-price {
            font-size: 1.1rem;
            color: var(--profit-green);
        }

        .timeframe-selector {
            display: flex;
            gap: 4px;
        }

        .tf-btn {
            background: transparent;
            border: 1px solid transparent;
            color: var(--text-muted);
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .tf-btn.active, .tf-btn:hover {
            color: var(--jarvis-neon);
            border-color: rgba(56, 189, 248, 0.3);
            background: rgba(56, 189, 248, 0.05);
        }

        /* TradingView Widget Container */
        #tv-chart-widget {
            flex: 1;
            width: 100%;
            position: relative;
            min-height: 0;
        }

        #tv-chart-widget iframe {
            width: 100% !important;
            height: 100% !important;
        }

        /* SMC Analysis Floating Overlay */
        .smc-overlay {
            position: absolute;
            top: 60px;
            left: 16px;
            z-index: 20;
            pointer-events: none;
            display: none;
            animation: fadeInOverlay 0.5s ease;
        }

        .smc-overlay.active {
            display: block;
        }

        @keyframes fadeInOverlay {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .smc-card {
            background: rgba(10, 14, 23, 0.92);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(56, 189, 248, 0.3);
            border-radius: 12px;
            padding: 14px 18px;
            min-width: 260px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.5), 0 0 15px rgba(56, 189, 248, 0.08);
            pointer-events: auto;
        }

        .smc-card-title {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--jarvis-neon);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .smc-card-close {
            margin-left: auto;
            cursor: pointer;
            color: var(--text-muted);
            font-size: 1rem;
            pointer-events: auto;
        }

        .smc-card-close:hover { color: #fff; }

        .smc-level {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 5px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 0.88rem;
        }

        .smc-level:last-child { border: none; }

        .smc-level-label { color: var(--text-muted); font-size: 0.78rem; }
        .smc-level-val { font-weight: 600; font-variant-numeric: tabular-nums; }
        .smc-level-val.buy { color: var(--jarvis-neon); }
        .smc-level-val.sell { color: var(--loss-red); }
        .smc-level-val.entry { color: var(--gold); }
        .smc-level-val.sl { color: var(--loss-red); }
        .smc-level-val.tp { color: var(--profit-green); }

        .smc-tag {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.72rem;
            font-weight: 600;
            margin-top: 8px;
        }

        .smc-tag.buy { background: rgba(56, 189, 248, 0.15); color: var(--jarvis-neon); border: 1px solid rgba(56, 189, 248, 0.3); }
        .smc-tag.sell { background: rgba(239, 68, 68, 0.15); color: var(--loss-red); border: 1px solid rgba(239, 68, 68, 0.3); }

        /* ----- RIGHT: CHAT AREA ----- */
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-panel);
            min-width: 0;
            max-width: 420px;
        }

        .chat-header {
            padding: 12px 16px;
            background: rgba(17, 24, 39, 0.9);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .jarvis-avatar {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #0ea5e9, #6366f1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .jarvis-status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.75rem;
            color: var(--profit-green);
        }

        .status-dot {
            width: 6px;
            height: 6px;
            background: var(--profit-green);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .chat-history {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .chat-history::-webkit-scrollbar { width: 4px; }
        .chat-history::-webkit-scrollbar-track { background: transparent; }
        .chat-history::-webkit-scrollbar-thumb { background: #374151; border-radius: 4px; }

        .message {
            padding: 12px 16px;
            border-radius: 12px;
            max-width: 100%;
            font-size: 0.9rem;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .msg-ai {
            background: rgba(14, 165, 233, 0.08);
            border: 1px solid rgba(14, 165, 233, 0.15);
            border-radius: 12px 12px 12px 4px;
        }

        .msg-user {
            background: rgba(99, 102, 241, 0.15);
            border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: 12px 12px 4px 12px;
            align-self: flex-end;
        }

        .strategy-tag {
            display: inline-block;
            padding: 3px 10px;
            background: rgba(56, 189, 248, 0.1);
            border: 1px solid rgba(56, 189, 248, 0.3);
            border-radius: 20px;
            font-size: 0.75rem;
            color: var(--jarvis-neon);
            margin-bottom: 8px;
        }

        .action-box {
            margin-top: 16px;
            padding: 14px;
            background: rgba(10, 14, 23, 0.8);
            border: 1px solid var(--border-color);
            border-radius: 10px;
        }

        .action-specs { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 12px; }
        .spec { display: flex; justify-content: space-between; padding: 4px 0; }
        .spec-label { font-size: 0.78rem; color: var(--text-muted); }
        .spec-val { font-weight: 600; font-size: 0.85rem; color: var(--text-main); }
        .spec-val.buy { color: var(--jarvis-neon); }
        .spec-val.sl { color: var(--loss-red); }
        .spec-val.tp { color: var(--profit-green); }

        .action-buttons { display: flex; gap: 8px; }
        .btn { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 0.85rem; transition: all 0.2s; }
        .btn-yes { background: var(--profit-green); color: #fff; }
        .btn-yes:hover { background: #059669; }
        .btn-no { background: rgba(239, 68, 68, 0.15); color: var(--loss-red); border: 1px solid rgba(239, 68, 68, 0.3); }
        .btn-no:hover { background: rgba(239, 68, 68, 0.25); }

        .chat-input-area {
            padding: 12px 16px;
            background: rgba(17, 24, 39, 0.95);
            border-top: 1px solid var(--border-color);
        }

        .input-wrapper {
            display: flex;
            gap: 8px;
        }

        .chat-input {
            flex: 1;
            padding: 10px 14px;
            background: rgba(31, 41, 55, 0.8);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-main);
            font-size: 0.9rem;
            outline: none;
            transition: border 0.2s;
        }

        .chat-input:focus { border-color: var(--jarvis-blue); }

        .send-btn {
            padding: 10px 14px;
            background: linear-gradient(135deg, #0ea5e9, #6366f1);
            border: none;
            border-radius: 8px;
            color: #fff;
            cursor: pointer;
            transition: all 0.2s;
        }

        .send-btn:hover { transform: scale(1.05); }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .workspace { flex-direction: column; }
            .chart-container { flex: 1; border-right: none; border-bottom: 1px solid var(--border-color); min-height: 45vh; }
            .chat-container { max-width: none; flex: 1; }
            .smc-overlay { top: 10px; left: 8px; }
            .smc-card { min-width: 200px; padding: 10px 14px; }
        }
    </style>
</head>
<body>

    <header class="header">
        <a href="index.html" class="header-logo">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#38bdf8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>
            </svg>
            <div class="header-title">Jarvis Trading Terminal</div>
        </a>
        <a href="index.html" class="back-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            Exit Terminal
        </a>
    </header>

    <!-- Main Workspace -->
    <main class="workspace">
        
        <!-- Left: Chart Area -->
        <section class="chart-container">
            <div class="chart-header">
                <div class="asset-info">
                    <span class="asset-name">XAUUSD</span>
                    <span class="asset-price" id="live-price">Loading...</span>
                </div>
                <div class="timeframe-selector">
                    <button class="tf-btn" onclick="switchTimeframe('1', this)">M1</button>
                    <button class="tf-btn" onclick="switchTimeframe('5', this)">M5</button>
                    <button class="tf-btn" onclick="switchTimeframe('15', this)">M15</button>
                    <button class="tf-btn" onclick="switchTimeframe('30', this)">M30</button>
                    <button class="tf-btn active" onclick="switchTimeframe('60', this)">H1</button>
                    <button class="tf-btn" onclick="switchTimeframe('240', this)">H4</button>
                    <button class="tf-btn" onclick="switchTimeframe('D', this)">D1</button>
                </div>
            </div>

            <!-- TradingView Advanced Chart Widget -->
            <div id="tv-chart-widget"></div>

            <!-- SMC Analysis Floating Overlay (appears when Jarvis analyzes) -->
            <div class="smc-overlay" id="smc-overlay">
                <div class="smc-card" id="smc-card">
                    <!-- Filled dynamically by JS -->
                </div>
            </div>
        </section>

        <!-- Right: Chat Area -->
        <section class="chat-container">
            <div class="chat-header">
                <div class="jarvis-avatar">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><path d="M12 16v-4"></path><path d="M12 8h.01"></path></svg>
                </div>
                <div>
                    <div style="font-weight: 600; font-size: 0.95rem;">JARVIS AI</div>
                    <div class="jarvis-status"><div class="status-dot"></div> Connected to MT5</div>
                </div>
            </div>

            <div class="chat-history" id="chat-history">
                <!-- Welcome Msg -->
                <div class="message msg-ai">
                    สวัสดีครับ! ผม Jarvis AI พร้อมวิเคราะห์กราฟและส่งคำสั่งเทรดเข้า MT5 ให้ครับ<br><br>
                    ลองพิมพ์ เช่น <b>"วิเคราะห์ทอง"</b> หรือ <b>"Analyze XAUUSD"</b> ได้เลยครับ 🚀<br><br>
                    หรือจะถามเรื่องทั่วไปก็ได้นะครับ ผมตอบได้ทุกเรื่อง! 💬
                </div>
            </div>

            <div class="chat-input-area">
                <div class="input-wrapper">
                    <input type="text" id="chat-input" class="chat-input" placeholder="พิมพ์ข้อความถาม Jarvis...">
                    <button id="send-btn" class="send-btn" type="button">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                    </button>
                </div>
            </div>
        </section>

    </main>

    <script>
        const API_URL = "https://web-production-dae6e.up.railway.app";
        var smcDrawings = null;
        var currentSymbol = 'XAUUSD';
        var currentTimeframe = '60'; // TradingView interval format
        var lastTechnique = null;
        var tvWidget = null;

        // Map TradingView intervals to backend timeframe names
        const TV_TO_BACKEND = {
            '1': 'M1', '5': 'M5', '15': 'M15', '30': 'M30',
            '60': 'H1', '240': 'H4', 'D': 'D1'
        };

        function initTradingViewWidget() {
            var container = document.getElementById('tv-chart-widget');
            
            // Create TradingView Advanced Chart Widget
            tvWidget = new TradingView.widget({
                "autosize": true,
                "symbol": "OANDA:XAUUSD",
                "interval": currentTimeframe,
                "timezone": "Asia/Bangkok",
                "theme": "dark",
                "style": "1",
                "locale": "th_TH",
                "hide_top_toolbar": false,
                "hide_legend": false,
                "save_image": false,
                "calendar": false,
                "hide_volume": true,
                "support_host": "https://www.tradingview.com",
                "container_id": "tv-chart-widget",
                "toolbar_bg": "#0a0e17",
                "enable_publishing": false,
                "allow_symbol_change": false,
                "details": false,
                "hotlist": false,
                "withdateranges": false,
                "backgroundColor": "#0a0e17",
                "gridColor": "#1f2937",
                "studies": [],
                "overrides": {
                    "paneProperties.background": "#0a0e17",
                    "paneProperties.backgroundType": "solid",
                    "paneProperties.vertGridProperties.color": "#1f293720",
                    "paneProperties.horzGridProperties.color": "#1f293720",
                    "mainSeriesProperties.candleStyle.upColor": "#10b981",
                    "mainSeriesProperties.candleStyle.downColor": "#ef4444",
                    "mainSeriesProperties.candleStyle.borderUpColor": "#10b981",
                    "mainSeriesProperties.candleStyle.borderDownColor": "#ef4444",
                    "mainSeriesProperties.candleStyle.wickUpColor": "#10b981",
                    "mainSeriesProperties.candleStyle.wickDownColor": "#ef4444"
                }
            });

            // Update live price periodically from TradingView
            setInterval(updatePriceDisplay, 3000);
        }

        function updatePriceDisplay() {
            // Fetch current price from our backend (lightweight)
            fetch(API_URL + '/api/chart-live?symbol=' + currentSymbol + '&timeframe=' + TV_TO_BACKEND[currentTimeframe] + '&limit=1')
                .then(r => r.json())
                .then(data => {
                    if (data.candles && data.candles.length > 0) {
                        document.getElementById('live-price').innerText = data.candles[0].close.toFixed(2);
                    }
                })
                .catch(() => {});
        }

        function switchTimeframe(tvInterval, btn) {
            currentTimeframe = tvInterval;
            document.querySelectorAll('.tf-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            // Reload TradingView widget with new interval
            var container = document.getElementById('tv-chart-widget');
            container.innerHTML = '';
            initTradingViewWidget();

            // Hide SMC overlay when switching TF
            hideSMCOverlay();
        }

        // ---- SMC Analysis Overlay ----
        function showSMCOverlay(data) {
            var overlay = document.getElementById('smc-overlay');
            var card = document.getElementById('smc-card');
            
            var isBuy = data.isBuy;
            var actionClass = isBuy ? 'buy' : 'sell';
            var actionText = isBuy ? '🟢 BUY LIMIT' : '🔴 SELL LIMIT';
            var label = data.label || (isBuy ? 'Demand Zone' : 'Supply Zone');

            card.innerHTML = 
                '<div class="smc-card-title">' +
                    '🧠 JARVIS SMC ANALYSIS' +
                    '<span class="smc-card-close" onclick="hideSMCOverlay()">✕</span>' +
                '</div>' +
                '<div class="smc-level"><span class="smc-level-label">Setup</span><span class="smc-level-val">' + label + '</span></div>' +
                '<div class="smc-level"><span class="smc-level-label">Action</span><span class="smc-level-val ' + actionClass + '">' + actionText + '</span></div>' +
                '<div class="smc-level"><span class="smc-level-label">Zone</span><span class="smc-level-val">' + (data.zone_bottom || '—') + ' — ' + (data.zone_top || '—') + '</span></div>' +
                '<div class="smc-level"><span class="smc-level-label">📍 Entry</span><span class="smc-level-val entry">' + data.entry.toFixed(2) + '</span></div>' +
                '<div class="smc-level"><span class="smc-level-label">🛑 Stop Loss</span><span class="smc-level-val sl">' + data.sl.toFixed(2) + '</span></div>' +
                '<div class="smc-level"><span class="smc-level-label">🎯 Take Profit</span><span class="smc-level-val tp">' + data.tp.toFixed(2) + '</span></div>' +
                '<div class="smc-tag ' + actionClass + '">' + (data.technique_name || 'SMC Setup') + '</div>';

            overlay.classList.add('active');
        }

        function hideSMCOverlay() {
            document.getElementById('smc-overlay').classList.remove('active');
        }

        // ---- Chat Logic ----
        function addMessage(text, isUser, htmlContent) {
            const chatHistory = document.getElementById('chat-history');
            const div = document.createElement('div');
            div.className = 'message ' + (isUser ? 'msg-user' : 'msg-ai');
            if (htmlContent) { div.innerHTML = htmlContent; } else { div.innerText = text; }
            chatHistory.appendChild(div);
            chatHistory.scrollTop = chatHistory.scrollHeight;
        }

        async function submitMessage() {
            const chatInput = document.getElementById('chat-input');
            const text = chatInput.value.trim();
            if (!text) return;

            addMessage(text, true);
            chatInput.value = '';

            const loadingId = 'load_' + Date.now();
            addMessage('', false, '<div id="' + loadingId + '" class="jarvis-status"><div class="status-dot"></div> กำลังวิเคราะห์ตลาด...</div>');

            try {
                const backendTF = TV_TO_BACKEND[currentTimeframe] || 'H1';
                const res = await fetch(API_URL + '/terminal-chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text, symbol: currentSymbol, timeframe: backendTF, last_technique: lastTechnique })
                });
                const result = await res.json();
                var el = document.getElementById(loadingId);
                if (el && el.parentElement) el.parentElement.remove();

                if (result && result.reply) {
                    var r = result.reply;
                    var html = '';
                    if (r.strategy) html += '<div class="strategy-tag">' + r.strategy + '</div>';
                    html += '<div>' + r.text + '</div>';
                    if (r.last_technique) lastTechnique = r.last_technique;

                    if (r.action) {
                        html += '<div class="action-box">';
                        html += '<div style="font-size:0.8rem;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);margin-bottom:8px">Recommended Setup</div>';
                        html += '<div class="action-specs">';
                        html += '<div class="spec"><span class="spec-label">Action</span> <span class="spec-val buy">' + r.action.type + '</span></div>';
                        html += '<div class="spec"><span class="spec-label">Risk</span> <span class="spec-val" style="color:var(--text-main)">' + r.action.risk + '</span></div>';
                        html += '<div class="spec"><span class="spec-label">Entry</span> <span class="spec-val">' + r.action.entry + '</span></div>';
                        html += '<div class="spec"><span class="spec-label">Volume</span> <span class="spec-val">' + r.action.volume + '</span></div>';
                        html += '<div class="spec"><span class="spec-label">Stop Loss</span> <span class="spec-val sl">' + r.action.sl + '</span></div>';
                        html += '<div class="spec"><span class="spec-label">Take Profit</span> <span class="spec-val tp">' + r.action.tp + '</span></div>';
                        html += '</div>';
                        html += '<div style="margin-bottom:12px;font-size:0.9rem">ต้องการให้ผมวางออเดอร์เข้า MT5 เลยไหมครับ?</div>';
                        html += '<div class="action-buttons">';
                        html += '<button class="btn btn-yes" onclick="executeOrder(this)">YES, EXECUTE</button>';
                        html += '<button class="btn btn-no" onclick="this.parentElement.parentElement.innerHTML=\'❌ Cancelled\'">NO, CANCEL</button>';
                        html += '</div></div>';
                    }
                    addMessage('', false, html);

                    // Show SMC Floating Overlay on chart
                    if (r.drawings && r.drawings.entry) {
                        smcDrawings = {
                            entry: r.drawings.entry,
                            sl: r.drawings.sl,
                            tp: r.drawings.tp,
                            zone_top: r.drawings.zone_top || null,
                            zone_bottom: r.drawings.zone_bottom || null,
                            isBuy: r.drawings.isBuy !== undefined ? r.drawings.isBuy : r.action.type.includes('BUY'),
                            label: r.drawings.label,
                            technique_name: r.strategy || 'SMC Setup'
                        };
                        showSMCOverlay(smcDrawings);
                    }
                }
            } catch (e) {
                var el2 = document.getElementById(loadingId);
                if (el2 && el2.parentElement) el2.parentElement.remove();
                addMessage('❌ Server ไม่ตอบสนอง: ' + e.message, false);
            }
        }

        function executeOrder(btn) {
            btn.innerHTML = 'EXECUTING...';
            fetch(API_URL + '/terminal-execute', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({}) })
                .then(r => r.json())
                .then(result => { btn.parentElement.innerHTML = '<span style="color:var(--profit-green)"><b>' + result.message + '</b></span>'; })
                .catch(() => { btn.innerHTML = 'FAILED!'; });
        }

        // ---- Init on page load ----
        document.addEventListener('DOMContentLoaded', function() {
            setTimeout(initTradingViewWidget, 200);

            var sendBtn = document.getElementById('send-btn');
            var chatInput = document.getElementById('chat-input');

            sendBtn.addEventListener('click', function(e) { e.preventDefault(); submitMessage(); });
            sendBtn.addEventListener('touchend', function(e) { e.preventDefault(); submitMessage(); });
            chatInput.addEventListener('keypress', function(e) { if (e.key === 'Enter') { e.preventDefault(); submitMessage(); } });
        });
    </script>

    <!-- TradingView Widget Script -->
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>

</body>
</html>
